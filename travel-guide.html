<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СТРАННИК — AI Аудиогид</title>
    <meta name="description" content="Мобильный AI аудиогид для пешеходных прогулок">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="СТРАННИК">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiByeD0iNDAiIGZpbGw9IiMwYTBmMWUiLz4KPHRleHQgeD0iOTYiIHk9IjEwNCIgZm9udC1mYW1pbHk9IlVuYm91bmRlZCIgZm9udC1zaXplPSI2NCIgZmlsbD0iI2M5YTg0YyIgdGV4dC1hbmNob3I9Im1pZGRsZSI+UzwvdGV4dD4KPC9zdmc+">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0d3A6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGYxZSIvPgo8dGV4dCB4PSIxNiIgeT0iMjIiIGZvbnQtZmFtaWx5PSJVbmJvdW5kZWQiIGZvbnQtc2l6ZT0iMTYiIGZpbGw9IiNjOWE4NGMiIHRleHQtYW5jaG9yPSJtaWRkbGUiPlM8L3RleHQ+Cjwvc3ZnPg==">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;900&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        :root {
            --ink: #0a0f1e;
            --ink2: #111827;
            --paper: #f0ece3;
            --gold: #c9a84c;
            --gold2: #e8c97a;
            --teal: #2dd4bf;
            --red: #ef4444;
            --muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--ink);
            color: var(--paper);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #loading .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        #loading .subtitle {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--ink2);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        .leaflet-control-container {
            display: none;
        }

        #topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--gold);
        }

        #subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: -0.5rem;
        }

        #settings-btn {
            width: 40px;
            height: 40px;
            background: rgba(201, 168, 76, 0.2);
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        #settings-btn:hover {
            background: rgba(201, 168, 76, 0.4);
        }

        #status-pill {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ink2);
            color: var(--paper);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        #status-pill.show {
            opacity: 1;
        }

        #main-btn {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--ink);
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
            transition: all 0.3s;
            z-index: 1000;
        }

        #main-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
        }

        #main-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .marker {
            width: 30px;
            height: 30px;
            background: var(--gold);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .user-marker {
            width: 20px;
            height: 20px;
            background: var(--teal);
            border-radius: 50%;
            border: 2px solid var(--paper);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        #point-card {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 1000;
        }

        #point-card.show {
            transform: translateY(0);
        }

        #point-card .title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        #point-card .description {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        #point-card .guide-btn {
            background: var(--gold);
            color: var(--ink);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        #point-card .guide-btn:hover {
            background: var(--gold2);
        }

        #guide-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ink);
            z-index: 2000;
            transform: translateY(100%);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        #guide-panel.show {
            transform: translateY(0);
        }

        #guide-header {
            padding: 1.5rem;
            background: var(--ink2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #guide-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
        }

        #guide-close {
            background: none;
            border: none;
            color: var(--paper);
            font-size: 1.5rem;
            cursor: pointer;
        }

        #guide-content {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        #guide-text {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        #tts-btn {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--ink);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
            transition: all 0.3s;
        }

        #tts-btn.playing {
            background: var(--red);
        }

        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #settings-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        #settings-content {
            background: var(--ink2);
            width: 100%;
            padding: 2rem;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        #settings-modal.show #settings-content {
            transform: translateY(0);
        }

        #settings-content .title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #settings-content .field {
            margin-bottom: 1.5rem;
        }

        #settings-content label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        #api-key {
            width: 100%;
            padding: 0.75rem;
            background: var(--ink);
            border: 1px solid var(--muted);
            border-radius: 8px;
            color: var(--paper);
            font-family: 'Jost', sans-serif;
        }

        #radius-select {
            width: 100%;
            padding: 0.75rem;
            background: var(--ink);
            border: 1px solid var(--muted);
            border-radius: 8px;
            color: var(--paper);
            font-family: 'Jost', sans-serif;
        }

        #settings-save {
            width: 100%;
            background: var(--gold);
            color: var(--ink);
            border: none;
            padding: 1rem;
            border-radius: 25px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        #settings-link {
            display: block;
            color: var(--gold);
            text-decoration: none;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            #topbar {
                padding: 0.75rem;
            }
            #logo {
                font-size: 1.2rem;
            }
            #main-btn {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="logo">СТРАННИК</div>
        <div class="subtitle">AI Аудиогид</div>
        <div class="spinner"></div>
    </div>

    <div id="map"></div>

    <div id="topbar">
        <div>
            <div id="logo">СТРАННИК</div>
            <div id="subtitle">AI Аудиогид</div>
        </div>
        <button id="settings-btn">⚙</button>
    </div>

    <div id="status-pill"></div>

    <button id="main-btn">Построить маршрут прогулки</button>

    <div id="point-card">
        <div class="title" id="point-title"></div>
        <div class="description" id="point-description"></div>
        <button class="guide-btn" id="guide-btn">Рассказ гида</button>
    </div>

    <div id="guide-panel">
        <div id="guide-header">
            <div id="guide-title"></div>
            <button id="guide-close">×</button>
        </div>
        <div id="guide-content">
            <div id="guide-text"></div>
        </div>
        <button id="tts-btn">🔊</button>
    </div>

    <div id="settings-modal">
        <div id="settings-content">
            <div class="title">Настройки</div>
            <div class="field">
                <label for="api-key">Gemini API ключ</label>
                <input type="password" id="api-key" placeholder="Введите ваш API ключ">
            </div>
            <div class="field">
                <label for="radius-select">Радиус поиска (км)</label>
                <select id="radius-select">
                    <option value="2">2</option>
                    <option value="3.5" selected>3.5</option>
                    <option value="5">5</option>
                </select>
            </div>
            <button id="settings-save">Сохранить</button>
            <a href="https://aistudio.google.com" target="_blank" id="settings-link">Получить API ключ</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const state = {
            map: null,
            userMarker: null,
            routeMarkers: [],
            routeLayer: null,
            currentPoint: null,
            guideText: '',
            isSpeaking: false,
            apiKey: localStorage.getItem('geminiApiKey') || '',
            radius: parseFloat(localStorage.getItem('searchRadius') || '3.5'),
            voices: []
        };

        function showStatus(message, duration = 3000) {
            const pill = document.getElementById('status-pill');
            pill.textContent = message;
            pill.classList.add('show');
            setTimeout(() => pill.classList.remove('show'), duration);
        }

        function initMap() {
            state.map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([55.7558, 37.6173], 13);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(state.map);

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    state.map.setView([latitude, longitude], 16);
                    addUserMarker(latitude, longitude);
                    document.getElementById('loading').style.display = 'none';
                    showStatus('Геолокация получена');
                },
                (err) => {
                    console.error('Geolocation error:', err);
                    document.getElementById('loading').style.display = 'none';
                    showStatus('Ошибка геолокации. Разрешите доступ к местоположению.');
                }
            );
        }

        function addUserMarker(lat, lng) {
            if (state.userMarker) {
                state.map.removeLayer(state.userMarker);
            }
            state.userMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'user-marker',
                    html: '',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                })
            }).addTo(state.map);
        }

        async function searchPOIs(lat, lng, radius) {
            const query = `
                [out:json][timeout:25];
                (
                    node["tourism"~"attraction|museum|viewpoint|artwork"](around:${radius * 1000},${lat},${lng});
                    node["historic"~"monument|memorial|castle|ruins"](around:${radius * 1000},${lat},${lng});
                    node["amenity"~"place_of_worship"](around:${radius * 1000},${lat},${lng});
                    node["leisure"~"park|garden"](around:${radius * 1000},${lat},${lng});
                    node["natural"~"peak|spring|cave_entrance"](around:${radius * 1000},${lat},${lng});
                );
                out meta;
            `;

            try {
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });
                const data = await response.json();
                return data.elements.filter(el => el.tags && el.tags.name).slice(0, 60);
            } catch (error) {
                console.error('Overpass API error:', error);
                showStatus('Ошибка поиска мест');
                return [];
            }
        }

        async function selectRoute(pois) {
            if (!state.apiKey) {
                showStatus('Введите API ключ в настройках');
                return [];
            }

            const prompt = `Выбери 5-7 самых интересных мест для пешеходной прогулки из этого списка. Учитывай разнообразие типов мест, логичность маршрута и пешеходную доступность. Ответь строго в JSON формате: [{"index": номер в списке (начиная с 0), "name": "название", "short": "2-3 предложения описания"}]

Список мест:
${pois.map((poi, i) => `${i}. ${poi.tags.name} (${poi.tags.tourism || poi.tags.historic || poi.tags.amenity || poi.tags.leisure || poi.tags.natural || 'другое'})`).join('\n')}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                text = text.replace(/```json\n?/, '').replace(/\n?```/, '');
                const route = JSON.parse(text);
                return route;
            } catch (error) {
                console.error('Gemini API error:', error);
                showStatus('Ошибка выбора маршрута');
                return [];
            }
        }

        function displayRoute(route, pois) {
            if (state.routeLayer) {
                state.map.removeLayer(state.routeLayer);
            }
            state.routeMarkers.forEach(marker => state.map.removeLayer(marker));
            state.routeMarkers = [];

            const colors = ['#c9a84c', '#2dd4bf', '#ef4444', '#8b5cf6', '#f59e0b', '#06b6d4', '#84cc16'];
            const latlngs = [];

            route.forEach((point, i) => {
                const poi = pois[point.index];
                const marker = L.marker([poi.lat, poi.lon], {
                    icon: L.divIcon({
                        className: 'marker',
                        html: `<span>${i + 1}</span>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 30]
                    })
                }).addTo(state.map);
                marker.getElement().style.backgroundColor = colors[i % colors.length];
                marker.on('click', () => showPointCard(point, poi));
                state.routeMarkers.push(marker);
                latlngs.push([poi.lat, poi.lon]);
            });

            state.routeLayer = L.polyline(latlngs, {
                color: 'var(--gold)',
                weight: 3,
                opacity: 0.7,
                dashArray: '10, 10'
            }).addTo(state.map);

            state.map.fitBounds(L.latLngBounds(latlngs), { padding: [20, 20] });
        }

        function showPointCard(point, poi) {
            state.currentPoint = { ...point, poi };
            document.getElementById('point-title').textContent = point.name;
            document.getElementById('point-description').textContent = point.short;
            document.getElementById('point-card').classList.add('show');
        }

        async function generateGuideText() {
            if (!state.apiKey) {
                showStatus('Введите API ключ в настройках');
                return;
            }

            const prompt = `Напиши рассказ гида на русском языке для места "${state.currentPoint.name}". Объём 150-200 слов. Стиль: харизматичный гид, разговорный язык, обращение на "вы". Начни с яркой захватывающей фразы. Расскажи историю/факт/легенду и дай совет что заметить прямо сейчас. Чистый текст без markdown.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                state.guideText = data.candidates[0].content.parts[0].text;
                document.getElementById('guide-text').textContent = state.guideText;
                document.getElementById('guide-title').textContent = state.currentPoint.name;
                document.getElementById('guide-panel').classList.add('show');
            } catch (error) {
                console.error('Gemini API error:', error);
                showStatus('Ошибка генерации рассказа');
            }
        }

        function initTTS() {
            speechSynthesis.onvoiceschanged = () => {
                state.voices = speechSynthesis.getVoices();
            };
            state.voices = speechSynthesis.getVoices();
        }

        function speakText() {
            if (state.isSpeaking) {
                speechSynthesis.cancel();
                state.isSpeaking = false;
                document.getElementById('tts-btn').textContent = '🔊';
                document.getElementById('tts-btn').classList.remove('playing');
                return;
            }

            const utterance = new SpeechSynthesisUtterance(state.guideText);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.95;
            const russianVoice = state.voices.find(voice => voice.lang === 'ru-RU');
            if (russianVoice) {
                utterance.voice = russianVoice;
            }

            utterance.onstart = () => {
                state.isSpeaking = true;
                document.getElementById('tts-btn').textContent = '⏹';
                document.getElementById('tts-btn').classList.add('playing');
            };

            utterance.onend = () => {
                state.isSpeaking = false;
                document.getElementById('tts-btn').textContent = '🔊';
                document.getElementById('tts-btn').classList.remove('playing');
            };

            speechSynthesis.speak(utterance);
        }

        function initUI() {
            document.getElementById('main-btn').addEventListener('click', async () => {
                const btn = document.getElementById('main-btn');
                btn.disabled = true;
                btn.textContent = 'Поиск мест...';
                showStatus('Поиск достопримечательностей');

                const center = state.map.getCenter();
                const pois = await searchPOIs(center.lat, center.lng, state.radius);

                if (pois.length === 0) {
                    showStatus('Места не найдены');
                    btn.disabled = false;
                    btn.textContent = 'Построить маршрут прогулки';
                    return;
                }

                btn.textContent = 'Выбор маршрута...';
                showStatus('Выбор оптимального маршрута');

                const route = await selectRoute(pois);

                if (route.length === 0) {
                    showStatus('Не удалось выбрать маршрут');
                    btn.disabled = false;
                    btn.textContent = 'Построить маршрут прогулки';
                    return;
                }

                displayRoute(route, pois);
                showStatus(`Маршрут готов! ${route.length} точек`);
                btn.disabled = false;
                btn.textContent = 'Построить маршрут прогулки';
            });

            document.getElementById('guide-btn').addEventListener('click', generateGuideText);

            document.getElementById('guide-close').addEventListener('click', () => {
                document.getElementById('guide-panel').classList.remove('show');
                if (state.isSpeaking) {
                    speechSynthesis.cancel();
                    state.isSpeaking = false;
                    document.getElementById('tts-btn').textContent = '🔊';
                    document.getElementById('tts-btn').classList.remove('playing');
                }
            });

            document.getElementById('tts-btn').addEventListener('click', speakText);

            document.getElementById('settings-btn').addEventListener('click', () => {
                document.getElementById('api-key').value = state.apiKey;
                document.getElementById('radius-select').value = state.radius;
                document.getElementById('settings-modal').classList.add('show');
            });

            document.getElementById('settings-save').addEventListener('click', () => {
                state.apiKey = document.getElementById('api-key').value;
                state.radius = parseFloat(document.getElementById('radius-select').value);
                localStorage.setItem('geminiApiKey', state.apiKey);
                localStorage.setItem('searchRadius', state.radius);
                document.getElementById('settings-modal').classList.remove('show');
                showStatus('Настройки сохранены');
            });

            document.getElementById('settings-modal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('settings-modal')) {
                    document.getElementById('settings-modal').classList.remove('show');
                }
            });

            document.getElementById('point-card').addEventListener('click', (e) => {
                if (e.target === document.getElementById('point-card')) {
                    document.getElementById('point-card').classList.remove('show');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            initTTS();
            initUI();
        });
    </script>
</body>
</html>
